<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Weiai CTMS 项目页原型</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .device-mockup { width: 375px; height: 812px; background: #f8fafc; margin: 20px auto; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); position: relative; overflow: hidden; display: flex; flex-direction: column; border: 8px solid #111827; }
    .safe-area-top { height: 44px; background: #f8fafc; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 14px; font-weight: 600; z-index: 50; }
    .dynamic-island { width: 120px; height: 30px; background: black; border-radius: 15px; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Folder-style Tab Transitions */
    .module-tab { 
      position: relative; 
      transition: all 0.3s;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      padding: 6px 16px;
      font-size: 12px;
      color: #6b7280;
      margin-right: 4px;
      z-index: 1;
    }
    .module-tab.active { 
      background: white;
      color: #111827; 
      font-weight: bold;
      border-color: #e5e7eb;
      z-index: 3;
    }
    /* Hide the bottom border of the active tab to make it look like a folder */
    .module-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: white;
    }
    /* Add a subtle top border highlight for the active tab based on module color */
    .tab-iwrs.active { border-top: 3px solid #3b82f6; } /* Blue */
    .tab-followup.active { border-top: 3px solid #10b981; }  /* Emerald */
    
    .card-content-container {
      border-top: 1px solid #e5e7eb;
      margin-top: -1px;
      position: relative;
      z-index: 2;
    }
    
    .card-content { display: none; animation: fadeIn 0.3s ease; }
    .card-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-100">

<div class="device-mockup">
  <div class="safe-area-top sticky top-0 z-50">
    <div class="dynamic-island"></div>
    <span>09:41</span>
    <div class="flex gap-1 items-center">
      <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11.5a8.5 8.5 0 0115.16-5.46l-1.04.75A7.25 7.25 0 003.25 11.5H2zm3 3A4.5 4.5 0 0112.55 11h-1.2A3.25 3.25 0 006.25 14.5H5zm3 3A1.5 1.5 0 019.5 16h-1A2.5 2.5 0 006 18.5H8z"/></svg>
      <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zm0 14.5a6.5 6.5 0 110-13 6.5 6.5 0 010 13z"/></svg>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto pb-16">
    <div class="px-5 pt-6 pb-2 sticky top-0 bg-[#f8fafc] z-40">
      <h1 class="text-2xl font-bold text-gray-900 mb-4">我的项目</h1>
      <div class="relative">
        <svg class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <input type="text" placeholder="搜索项目编号或名称..." class="w-full bg-white border border-gray-200 rounded-xl py-2 pl-9 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>
    
    <div class="px-5 mt-4 space-y-5">
      
      <!-- 项目 1: 既有 IWRS 又有随访 -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        <!-- 头部公用信息 -->
        <div class="p-4 pb-2">
          <div class="flex justify-between items-start mb-2">
            <h3 class="font-bold text-gray-900 text-base">PROJ-2026-001</h3>
            <!-- 统一的项目宏观状态: 进行中 (绿色) -->
            <span class="px-2 py-0.5 bg-emerald-50 text-emerald-600 border border-emerald-100 text-[10px] rounded-full font-bold">进行中</span>
          </div>
          <p class="text-xs text-gray-500 line-clamp-1">阿兹海默症 III 期多中心临床试验</p>
        </div>
        
        <!-- 文件夹风格 Tab 切换区 -->
        <div class="flex px-1 pt-2 items-end">
          <div class="module-tab tab-iwrs active cursor-pointer" onclick="switchCardTab('proj1', 'iwrs')">IWRS 系统</div>
          <div class="module-tab tab-followup cursor-pointer" onclick="switchCardTab('proj1', 'followup')">随访管理</div>
        </div>

        <!-- 内容容器区 -->
        <div class="card-content-container">
          <!-- IWRS 卡片内容 (默认显示) -->
          <div id="proj1-iwrs" class="card-content active p-4 pt-5 bg-white">
            <div class="grid grid-cols-3 gap-2 mb-4">
              <div class="text-center">
                <div class="text-[10px] text-gray-400 mb-1">筛查中</div>
                <div class="text-sm font-bold text-blue-600">18</div>
              </div>
              <div class="text-center border-l border-gray-100">
                <div class="text-[10px] text-gray-400 mb-1">已随机</div>
                <div class="text-sm font-bold text-blue-600">12<span class="text-[10px] text-gray-400 font-normal">/50</span></div>
              </div>
              <div class="text-center border-l border-gray-100">
                <div class="text-[10px] text-gray-400 mb-1">物资余量</div>
                <div class="text-sm font-bold text-blue-600">充足</div>
              </div>
            </div>
            <button onclick="window.location.href='ctms-miniprogram-prototype-detail.html'" class="w-full py-2 bg-blue-50 text-blue-600 border border-blue-100 rounded-lg text-xs font-bold hover:bg-blue-100 transition flex justify-center items-center gap-1">
              进入项目详情 <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
          </div>

          <!-- 随访卡片内容 (隐藏) -->
          <div id="proj1-followup" class="card-content p-4 pt-5 bg-white">
            <div class="grid grid-cols-3 gap-2 mb-4">
              <div class="text-center">
                <div class="text-[10px] text-gray-400 mb-1">访视中</div>
                <div class="text-sm font-bold text-emerald-600">10</div>
              </div>
              <div class="text-center border-l border-gray-100">
                <div class="text-[10px] text-gray-400 mb-1">表单录入</div>
                <div class="text-sm font-bold text-emerald-600">45%</div>
              </div>
              <div class="text-center border-l border-gray-100">
                <div class="text-[10px] text-gray-400 mb-1">待办质疑</div>
                <div class="text-sm font-bold text-rose-500">4</div>
              </div>
            </div>
            <button onclick="window.location.href='ctms-miniprogram-prototype-detail.html'" class="w-full py-2 bg-emerald-50 text-emerald-600 border border-emerald-100 rounded-lg text-xs font-bold hover:bg-emerald-100 transition flex justify-center items-center gap-1">
              进入项目详情 <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- 项目 2: 仅有随访 (没有 Tab 切换) -->
      <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 overflow-hidden relative">
        <div class="absolute top-0 left-0 w-1 h-full bg-emerald-400"></div>
        <!-- 头部公用信息 -->
        <div class="p-4 pb-3 border-b border-gray-50 pl-5">
          <div class="flex justify-between items-start mb-2">
            <div class="flex items-center gap-2">
              <h3 class="font-bold text-gray-900 text-base">PROJ-2025-042</h3>
              <span class="px-1.5 py-0.5 bg-emerald-50 text-emerald-600 text-[9px] font-bold rounded">仅随访</span>
            </div>
            <!-- 统一的项目宏观状态: 已结束 (灰色) -->
            <span class="px-2 py-0.5 bg-gray-50 text-gray-500 border border-gray-200 text-[10px] rounded-full font-bold">已结束</span>
          </div>
          <p class="text-xs text-gray-500 line-clamp-1">某创新药真实世界研究</p>
        </div>
        
        <!-- 随访卡片内容 -->
        <div class="p-4 bg-white pl-5">
          <div class="grid grid-cols-3 gap-2 mb-4">
            <div class="text-center">
              <div class="text-[10px] text-gray-400 mb-1">总受试者</div>
              <div class="text-sm font-bold text-gray-700">120</div>
            </div>
            <div class="text-center border-l border-gray-100">
              <div class="text-[10px] text-gray-400 mb-1">表单录入</div>
              <div class="text-sm font-bold text-gray-700">100%</div>
            </div>
            <div class="text-center border-l border-gray-100">
              <div class="text-[10px] text-gray-400 mb-1">待办质疑</div>
              <div class="text-sm font-bold text-gray-400">0</div>
            </div>
          </div>
          <button onclick="window.location.href='ctms-miniprogram-prototype-detail.html'" class="w-full py-2 bg-gray-50 text-gray-600 border border-gray-200 rounded-lg text-xs font-bold hover:bg-gray-100 transition flex justify-center items-center gap-1">
            进入项目详情 <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
          </button>
        </div>
      </div>
      
      <!-- 项目 3: 仅有 IWRS (没有 Tab 切换) -->
      <div class="bg-white rounded-2xl shadow-sm border border-blue-100 overflow-hidden relative">
        <div class="absolute top-0 left-0 w-1 h-full bg-blue-400"></div>
        <!-- 头部公用信息 -->
        <div class="p-4 pb-3 border-b border-gray-50 pl-5">
          <div class="flex justify-between items-start mb-2">
            <div class="flex items-center gap-2">
              <h3 class="font-bold text-gray-900 text-base">PROJ-2027-018</h3>
              <span class="px-1.5 py-0.5 bg-blue-50 text-blue-600 text-[9px] font-bold rounded">仅 IWRS</span>
            </div>
            <!-- 统一的项目宏观状态: 筹备期 (蓝色) -->
            <span class="px-2 py-0.5 bg-blue-50 text-blue-600 border border-blue-100 text-[10px] rounded-full font-bold">筹备期</span>
          </div>
          <p class="text-xs text-gray-500 line-clamp-1">某靶向药 I 期剂量递增试验</p>
        </div>
        
        <!-- IWRS 卡片内容 -->
        <div class="p-4 bg-white pl-5">
          <div class="grid grid-cols-3 gap-2 mb-4">
            <div class="text-center">
              <div class="text-[10px] text-gray-400 mb-1">中心启动</div>
              <div class="text-sm font-bold text-gray-700">2<span class="text-[10px] text-gray-400 font-normal">/5</span></div>
            </div>
            <div class="text-center border-l border-gray-100">
              <div class="text-[10px] text-gray-400 mb-1">物资入库</div>
              <div class="text-sm font-bold text-blue-600">待完成</div>
            </div>
            <div class="text-center border-l border-gray-100">
              <div class="text-[10px] text-gray-400 mb-1">随机池</div>
              <div class="text-sm font-bold text-gray-700">已生成</div>
            </div>
          </div>
          <button onclick="window.location.href='ctms-miniprogram-prototype-detail.html'" class="w-full py-2 bg-blue-50 text-blue-600 border border-blue-100 rounded-lg text-xs font-bold hover:bg-blue-100 transition flex justify-center items-center gap-1">
            进入项目详情 <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="absolute bottom-0 w-full bg-white border-t border-gray-100 px-6 py-2 pb-6 z-50 flex justify-between items-center shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
    <div class="flex flex-col items-center gap-1 text-gray-400 cursor-pointer w-16">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
      <span class="text-[10px] font-medium">工作台</span>
    </div>
    <div class="flex flex-col items-center gap-1 text-blue-600 cursor-pointer w-16">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
      <span class="text-[10px] font-medium">项目</span>
    </div>
    <div class="flex flex-col items-center gap-1 text-gray-400 cursor-pointer w-16">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
      <span class="text-[10px] font-medium">我的</span>
    </div>
  </div>

</div>

<script>
  function switchCardTab(projId, module) {
    // 获取该项目卡片下的所有 tabs 和 contents
    const card = document.getElementById(projId + '-iwrs').parentElement.parentElement;
    const tabs = card.querySelectorAll('.module-tab');
    const contents = card.querySelectorAll('.card-content');
    
    // 移除所有的 active 状态
    tabs.forEach(tab => tab.classList.remove('active'));
    contents.forEach(content => content.classList.remove('active'));
    
    // 添加选中的 active 状态
    card.querySelector(`.tab-${module}`).classList.add('active');
    document.getElementById(`${projId}-${module}`).classList.add('active');
  }
</script>

</body>
</html>
